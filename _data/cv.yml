honours:
  - text: 'Awarded €1.3M Starting Grant by the Fondo Italiano per la Scienza (FIS) on the topic of "Sensor-driven statistical tools to evaluate risks and manage safety in the built environment"'

  - text: 'Awarded 2024 Engineering Structures Best Paper of the Year (Artificial Intelligence in Structural Engineering) for paper on "Next-generation non-linear and collapse prediction models for short to long period systems via machine learning methods"'

  - text: 'Awarded Editor''s Featured Paper Award by Engineering Structures for paper on "Next-generation non-linear and collapse prediction models for short to long period systems via machine learning methods"'

  - text: "2022 recipient of the Shah Family Innovation Prize by the Earthquake Engineering Research Institute"
    link: "https://eeri.org/about-eeri/news/13895-2022-shah-family-innovation-prize-awarded-to-gerard-o-reilly"

  - text: 'Selected by editor as "Top Reviewer" for the journal Bulletin of Earthquake Engineering in 2020'

  - text: 'Won the "2020 Outstanding Paper Award" by the International Association for Bridge and Structural Engineering for the research article "Once upon a Time in Italy: The Tale of the Morandi Bridge"'
    link: "https://www.tandfonline.com/doi/full/10.1080/10168664.2018.1558033"

  - text: 'Awarded "Top Downloaded Paper 2018-2019" by Earthquake Engineering and Structural Dynamics for the article "Conceptual design in performance-based earthquake engineering"'
    link: "https://onlinelibrary.wiley.com/doi/10.1002/eqe.3141"

  - text: "Awarded a fellowship by the University of California Education Abroad Program to complete a 1-year research exchange at the University of California, Berkeley"

  - text: 'Awarded "Best Structures Paper" for paper presented at the BCRI2012 conference in Dublin, Ireland'

  - text: "Awarded 2 University Scholar prizes in recognition of academic excellence during undergraduate studies"

